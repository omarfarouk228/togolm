name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: togolm_test
          POSTGRES_USER: togolm_test
          POSTGRES_PASSWORD: togolm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U togolm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: togolm_test
      POSTGRES_USER: togolm_test
      POSTGRES_PASSWORD: togolm_test
      REDIS_URL: redis://localhost:6379/0
      API_SECRET_KEY: test-secret-key
      API_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-paraphrase-multilingual-minilm-${{ runner.os }}
          restore-keys: hf-paraphrase-multilingual-minilm-

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Initialize test database
        run: alembic upgrade head

      - name: Run tests
        run: pytest api/tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
