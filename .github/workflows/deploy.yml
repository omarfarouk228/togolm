name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy API to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/togolm

            # Pull latest code
            git pull origin main

            # Build and restart only the api service (zero-downtime)
            docker compose -f docker-compose.prod.yml build api
            docker compose -f docker-compose.prod.yml up -d --no-deps api

            # Wait for health check (via nginx on port 80)
            timeout 90 bash -c 'until curl -sf http://localhost/health; do sleep 3; done'
            echo "API is healthy."

            # Optionally restart nginx to pick up any config changes
            docker compose -f docker-compose.prod.yml restart nginx

            echo "Deployment complete."
