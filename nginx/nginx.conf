worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Rate limiting — 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name api.togolm.ai;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS API ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.togolm.ai;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # CORS headers (showcase calls from togolm.ai)
        add_header Access-Control-Allow-Origin "https://togolm.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        location / {
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE streaming support (for /v1/query/stream)
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;
        }

        # Health check endpoint — no rate limit
        location /health {
            proxy_pass http://api:8000/health;
        }

        # OPTIONS preflight
        location ~ ^/v1/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://togolm.ai";
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Content-Length 0;
                return 204;
            }
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;
        }
    }
}
